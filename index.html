<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудника</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    :root {
        /* Все цвета берем строго из темы Telegram */
        --tg-bg: var(--tg-theme-bg-color, #ffffff);
        --tg-text: var(--tg-theme-text-color, #000000);
        --tg-hint: var(--tg-theme-hint-color, #999999);
        --tg-button: var(--tg-theme-button-color, #2481cc);
        --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
        --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f4);
        --tg-input-bg: var(--tg-theme-input-bg-color, #ffffff);
        --tg-input-border: var(--tg-theme-hint-color, #dddddd);
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--tg-bg);
        color: var(--tg-text);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .registration-card {
        background: var(--tg-secondary-bg);
        padding: 30px 25px;
        border-radius: 24px; /* Более мягкие, современные углы */
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
        /* Легкая тень для объема карточки */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--tg-text);
        opacity: 0.9;
        margin-left: 4px;
    }

    /* --- ПРЕВРАЩАЕМ ПОЛЯ ВВОДА В КРАСИВЫЕ ЭЛЕМЕНТЫ --- */
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    input[type="date"],
    input[type="number"],
    select {
        width: 100%;
        padding: 15px 18px;
        margin-bottom: 22px;

        /* Цвет фона берем из темы (в темной теме он будет серым/черным) */
        background-color: var(--tg-input-bg);
        color: var(--tg-text);

        /* Граница: делаем её тонкой и мягкой */
        border: 1.5px solid var(--tg-input-border);
        border-radius: 14px; /* Закругленные края как в iOS/Android */

        font-size: 16px;
        font-weight: 400;
        box-sizing: border-box;
        outline: none;

        /* Плавность всех переходов */
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);

        /* Убираем стандартные тени браузера */
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    /* ЭФФЕКТ ПРИ НАВЕДЕНИИ НА ПОЛЕ */
    input:hover, select:hover {
        border-color: var(--tg-hint);
        background-color: var(--tg-input-bg);
    }

    /* ЭФФЕКТ ПРИ НАЖАТИИ (ФОКУС) */
    input:focus, select:focus {
        /* Граница становится яркой, как цвет кнопки Telegram */
        border-color: var(--tg-button);
        /* Добавляем мягкое свечение вокруг поля */
        box-shadow: 0 0 0 4px rgba(36, 129, 204, 0.15);
        /* Немного приподнимаем визуально */
        transform: translateY(-1px);
    }

    /* Стилизация плейсхолдера (подсказки) */
    ::placeholder {
        color: var(--tg-hint);
        opacity: 0.7;
    }

    /* --- КНОПКА "ЗАРЕГИСТРИРОВАТЬ" --- */
    .btn-submit {
        display: block;
        margin: 15px auto 0 auto;
        width: 100%;
        padding: 18px;

        background-color: var(--tg-button);
        color: var(--tg-button-text);
        border: none;
        border-radius: 16px;

        font-size: 18px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;

        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .btn-submit:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-submit:active {
        transform: translateY(0);
        filter: brightness(0.9);
    }

    /* Стилизация выпадающего списка (Select) */
    select {
        appearance: none; /* Убираем стандартную стрелку браузера */
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org/2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2424%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 15px center;
        padding-right: 45px;
    }
</style>
</head>
<body>

<div class="registration-card">
    <h2>Регистрация</h2>
    <form id="regForm">

        <div class="form-group">
            <label for="fio">ФИО</label>
            <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" required>
        </div> <!-- Исправлено: закрывающий тег был </div} -->

        <div class="form-group">
            <label for="branch">Филиал</label>
            <select id="branch" name="branch" required>
                <option value="" disabled selected>Выберите филиал</option>
                <option value="Аппарат управления">Аппарат управления</option>
                <option value="Мозырская ТЭЦ">Мозырская ТЭЦ</option>
                <option value="Гомельская ТЭЦ-2">Гомельская ТЭЦ-2</option>
                <option value="Светлогорская ТЭЦ">Светлогор．рская ТЭЦ</option>
                <option value="Гомельские электрические сети">Гомельские электрические сети</option>
                <option value="Жлобинские электрические сети">Жлобинские электрические сети</option>
                <option value="Мозырьские электрические сети">Мозырьские электрические сети</option>
                <option value="Речицкие электрические сети">Речицкие электрические сети</option>
                <option value="Гомельэнергоспецремонт">Гомельэнергоспецремонт</option>
                <option value="Инженерный центр">Инженерный центр</option>
                <option value="Гомельские тепловые сети">Гомельские тепловые сети</option>
                <option value="Энергосбыт">Эргосбыт</option>
                <option value="Дубрава-агро">Дубрава-агро</option>
                <option value="Агрофирма имени Лебедева">Агрофирма имени Лебедева</option>
                <option value="Учебный-центр">Учебный-центр</option>
            </select>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="tab_number">Табельный номер</label>
            <input type="number" id="tab_number" name="tab_number" placeholder="0000" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="gender">Пол</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Выберите пол</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
            </select>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <append label="Должность">
            <label for="position">Должность</label>
            <input type="text" id="position" name="position" placeholder="Напр: Инженер" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="arrival_date">Дата прихода</label>
            <input type="date" id="arrival_date" name="arrival_date" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="photo">Фото сотрудника</label>
            <input type="file" id="photo" name="photo" accept="image/*" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <!-- Исправлено: класс кнопки теперь btn-submit, как в CSS -->
        <button type="submit" class="btn-submit">Зарегистрировать</button>
    </form>
</div> <!-- Исправлено: закрывающий тег -->

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const form = document.getElementById('regForm');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Исправлено: поиск кнопки по правильному классу
        const submitBtn = document.querySelector('.btn-submit');
        const originalText = submitBtn.innerText;

        submitBtn.innerText = "Отправка...";
        submitBtn.disabled = true;

        const formData = new FormData(form);

        try {
            const response = await fetch('http://127.0.0.1:8000/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                alert("Успешно зарегистрировано!");
                tg.close();
            } else {
                alert("Ошибка: " + (result.detail || "Не удалось отправить данные"));
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("Ошибка сети. Проверьте соединение с сервером.");
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
