<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудника</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    :root {
        --tg-bg: varint(--tg-theme-bg-color, #ffffff);
        --tg-text: var(--tg-theme-text-color, #000000);
        --tg-hint: var(--tg-theme-hint-color, #999999);
        --tg-button: var(--tg-theme-button-color, #2481cc);
        --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
        --tg-input-border: var(--tg-theme-hint-color, #dddddd);
    }

    /* Применяем ко всем типам ввода сразу */
    input, select, textarea {
        /* Убираем стандартный белый фон браузера */
        background-color: transparent !important;
        background: transparent !important;

        /* Убираем системные стили (особенно важно для select и date) */
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;

        color: var(--tg-text) !important;
        border: 1.5px solid var(--tg-input-border) !important;
        border-radius: 10px !important;

        /* Уменьшаем размер: убираем лишнюю высоту */
        padding: 10px 14px !important;
        font-size: 15px !important;

        outline: none;
        box-sizing: border-box;
        transition: all 0.2s ease-in-out;
    }

    /* Специально для полей даты и времени, чтобы убрать белые иконки/фон */
    input[type="date"],
    input[type="time"],
    input[type="datetime-local"] {
        min-height: 40px; /* Ограничиваем минимальную высоту */
    }

    /* Эффект при фокусе (нажатии) */
    input:focus, select:focus {
        border-color: var(--tg-button) !important;
        box-shadow: 0 0 0 3px rgba(36, 129, 204, 0.15) !important;
    }

    /* Стилизация выпадающего списка (Select) */
    select {
        cursor: pointer;
        /* Добавляем кастомную стрелочку, так как appearance:none её удалил */
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2424%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23888888%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 10px center;
        padding-right: 35px !important;
    }

    /* Плейсхолдер (подсказка) */
    ::placeholder {
        color: var(--tg-hint) !important;
        opacity: 0.7;
    }

    /* Контейнер для формы, чтобы поля не слипались */
    .registration-card {
        background: var(--tg-secondary-bg, transparent);
        padding: 20px;
        border-radius: 20px;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
    }

    /* Стили для подписей (Label) */
    label {
        display: block;
        margin-bottom: 5px;
        margin-top: 15px;
        font-size: 14px;
        font-weight: 600;
        color: var(--tg-text);
        margin-left: 2px;
    }

    /* Кнопка */
    .btn-submit {
        width: 100%;
        margin-top: 25px;
        padding: 14px;
        background-color: var(--tg-button) !important;
        color: var(--tg-button-text) !important;
        border: none !important;
        border-radius: 12px !important;
        font-size: 16px;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.1s ease;
    }

    .btn-submit:active {
        transform: scale(0.98);
    }
</style>
</head>
<body>

<div class="registration-card">
    <h2>Регистрация</h2>
    <form id="regForm">

        <div class="form-group">
            <label for="fio">ФИО</label>
            <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" required>
        </div> <!-- Исправлено: закрывающий тег был </div} -->

        <div class="form-group">
            <label for="branch">Филиал</label>
            <select id="branch" name="branch" required>
                <option value="" disabled selected>Выберите филиал</option>
                <option value="Аппарат управления">Аппарат управления</option>
                <option value="Мозырская ТЭЦ">Мозырская ТЭЦ</option>
                <option value="Гомельская ТЭЦ-2">Гомельская ТЭЦ-2</option>
                <option value="Светлогорская ТЭЦ">Светлогор．рская ТЭЦ</option>
                <option value="Гомельские электрические сети">Гомельские электрические сети</option>
                <option value="Жлобинские электрические сети">Жлобинские электрические сети</option>
                <option value="Мозырьские электрические сети">Мозырьские электрические сети</option>
                <option value="Речицкие электрические сети">Речицкие электрические сети</option>
                <option value="Гомельэнергоспецремонт">Гомельэнергоспецремонт</option>
                <option value="Инженерный центр">Инженерный центр</option>
                <option value="Гомельские тепловые сети">Гомельские тепловые сети</option>
                <option value="Энергосбыт">Эргосбыт</option>
                <option value="Дубрава-агро">Дубрава-агро</option>
                <option value="Агрофирма имени Лебедева">Агрофирма имени Лебедева</option>
                <option value="Учебный-центр">Учебный-центр</option>
            </select>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="tab_number">Табельный номер</label>
            <input type="number" id="tab_number" name="tab_number" placeholder="0000" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="gender">Пол</label>
            <select id="gender" name="gender" required>
                <option value="" disabled selected>Выберите пол</option>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
            </select>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <append label="Должность">
            <label for="position">Должность</label>
            <input type="text" id="position" name="position" placeholder="Напр: Инженер" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="arrival_date">Дата прихода</label>
            <input type="date" id="arrival_date" name="arrival_date" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <div class="form-group">
            <label for="photo">Фото сотрудника</label>
            <input type="file" id="photo" name="photo" accept="image/*" required>
        </div> <!-- Исправлено: закрывающий тег -->

        <!-- Исправлено: класс кнопки теперь btn-submit, как в CSS -->
        <button type="submit" class="btn-submit">Зарегистрировать</button>
    </form>
</div> <!-- Исправлено: закрывающий тег -->

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const form = document.getElementById('regForm');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        // Исправлено: поиск кнопки по правильному классу
        const submitBtn = document.querySelector('.btn-submit');
        const originalText = submitBtn.innerText;

        submitBtn.innerText = "Отправка...";
        submitBtn.disabled = true;

        const formData = new FormData(form);

        try {
            const response = await fetch('http://127.0.0.1:8000/upload', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                alert("Успешно зарегистрировано!");
                tg.close();
            } else {
                alert("Ошибка: " + (result.detail || "Не удалось отправить данные"));
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("Ошибка сети. Проверьте соединение с сервером.");
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
