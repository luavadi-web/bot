<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация сотрудника</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva 'sans-serif';
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .registration-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            boxint-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { text-align: center; color: #333; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input[type="text"], input[type="tel"], input[type="date"],
        input[type="number"], select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            boxBox-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
            background-color: white;
        }

        /* Стили для поля загрузки файла */
        input[type="file"] {
            padding: 7px;
            background: #f8f9fa;
            border: 1px dashed #007bff;
            cursor: pointer;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="registration-card">
    <h2>Регистрация</h2>
    <!-- ВАЖНО: Добавлен enctype="multipart/form-data", без него файлы не отправятся! -->
    <form action="/upload" method="POST" enctype="multipart/form-data">

        <div class="form-group">
            <label for="fio">ФИО</label>
            <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" required>
        </div>

        <!-- ФИЛИАЛ -->
        <div class="form-group">
            <label for="branch">Филиал</label>
            <select id="branch" name="branch" required>
                <option value="" disabled selected>Выберите филиал</option>
                <option value="Аппарат управления">Аппарат управления</option>
                <option value="Мозырская ТЭЦ">Мозырская ТЭЦ</option>
                <option value="Гомельская ТЭЦ-2">Гомельская ТЭЦ-2</option>
                <option value="Светлогорская ТЭЦ‍">Светлогорская ТЭЦ‍</option>
                <option value="Гомельские электрические сети ">Гомельские электрические сети</option>
                <option value="Жлобинские электрические сети ">Жлобинские электрические сети</option>
                <option value="Мозырьские электрические сети ">Мозырьские электрические сети</option>
                <option value="Речицкие электрические сети ">Речицкие электрические сети</option>
                <option value="Гомельэнергоспецремонт ">Гомельэнергоспецремонт</option>
                <option value="Инженерный центр ">Инженерный центр</option>
                <option value="Гомельские тепловые сети ">Гомельские тепловые сети</option>
                <option value="Энергосбыт ">Энергосбыт</option>
                <option value="Дубрава-агро ">Дубрава-агро</option>
                <option value="Агрофирма имени Лебедева ">Агрофирма имени Лебедева</option>
                <option value="Учебный-центр ">Учебный-центр</option>
            </select>
        </div>


        <!-- НОВОЕ ПОЛЕ: Загрузка фото -->
        <div class="form-group">
            <label for="photo">Фото сотрудника</label>
            <input type="file" id="photo" name="photo" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="tab_number">Табельный номер</label>
            <input type="number" id="tab_number" name="tab_number" required>
        </div>

        <div class="form-group">
            <label for="gender">Пол</label>
            <select id="gender" name="gender" required>
                <option value="male">Мужской</option>
                <option value="female">Женский</option>
            </select>
        </div>

        <div class="form-group">
            <label for="phone">Номер телефона</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
        </div>

        <button type="submit" class="btn-submit">Зарегистрировать</button>
    </form>
</div>

</body>
</html>
